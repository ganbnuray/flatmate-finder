server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA plus API split. Paths under /auth, /profiles, /matches with
    # Accept: application/json proxy to the Flask backend. Everything else
    # (including browser deep links for those same paths with Accept:
    # text/html) falls through to the SPA. Mirrors setupProxy.js for prod.
    location ~ ^/(auth|profiles|matches) {
        if ($http_accept !~* "application/json") {
            rewrite ^ /index.html last;
        }
        proxy_pass http://backend:5050;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
