services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: flatmate
      POSTGRES_PASSWORD: flatmate
      POSTGRES_DB: flatmate_finder
    volumes:
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flatmate -d flatmate_finder"]
      interval: 3s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://flatmate:flatmate@db:5432/flatmate_finder
      FLASK_SECRET_KEY: dev-secret-not-for-production
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
